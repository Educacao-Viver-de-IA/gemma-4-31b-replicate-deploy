build:
  gpu: true
  cuda: "12.4"
  python_version: "3.11"
  python_packages:
    - "torch==2.6.0"
    - "torchvision==0.21.0"
    - "transformers>=4.51.0"
    - "accelerate>=1.0.0"
    - "pillow>=10.0.0"
    - "sentencepiece>=0.2.0"
    - "protobuf>=4.25.0"
    - "huggingface_hub>=0.24.0"
  system_packages:
    - libgl1
    - libglib2.0-0
  run:
    - command: python -c "from huggingface_hub import snapshot_download; snapshot_download(repo_id='google/gemma-4-31B-it', local_dir='/src/weights/model', token=open('/run/secrets/HF_TOKEN').read().strip())"
      mounts:
        - type: secret
          id: HF_TOKEN
          target: /run/secrets/HF_TOKEN

predict: "predict.py:Predictor"
