build:
  gpu: true
  cuda: "12.4"
  python_version: "3.11"
  python_packages:
    - "torch==2.6.0"
    - "torchvision==0.21.0"
    - "transformers>=4.51.0"
    - "accelerate>=1.0.0"
    - "pillow>=10.0.0"
    - "sentencepiece>=0.2.0"
    - "protobuf>=4.25.0"
    - "huggingface_hub>=0.24.0"
  system_packages:
    - libgl1
    - libglib2.0-0
  # Pesos NÃO baixados durante o build — pré-baixados no host VM e incluídos no contexto via COPY automático do cog (/src).
  # Estratégia adotada após HF Hub throttling repetido em downloads de modelos grandes dentro do buildkit.

predict: "predict.py:Predictor"
