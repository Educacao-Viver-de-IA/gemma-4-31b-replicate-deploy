name: Push to Replicate

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "cog.yaml"
      - "predict.py"
      - "script/**"

permissions:
  contents: read

jobs:
  push:
    # Larger runner padrão GH (4-core 150GB disk). Custom "ubuntu-large" não engatava.
    runs-on: ubuntu-latest-4-cores
    timeout-minutes: 180

    steps:
      - name: Free disk space on /
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Disk after cleanup
        run: df -h /

      - name: Install Cog v0.13.7
        uses: replicate/setup-cog@v2
        with:
          cog-version: v0.13.7

      - name: Docker login to r8.im
        env:
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
        run: |
          echo "$REPLICATE_API_TOKEN" | docker login r8.im -u csviverdeia --password-stdin

      - name: Push to Replicate
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          echo "▶ Iniciando cog push (build CUDA + download 62GB de pesos + upload)..."
          cog push r8.im/csviverdeia/gemma-4-31b-assistente \
            --secret id=HF_TOKEN,env=HF_TOKEN
          echo "✅ Push concluído."
